<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>跨境电商图片提示词库</title>
  <style>
    :root {
      --ink: #20201d;
      --muted: #6d6a62;
      --line: #ded8cc;
      --paper: #f7f3eb;
      --panel: #fffdf8;
      --accent: #176f5d;
      --accent-2: #c84b31;
      --soft: #e8f1ed;
      --shadow: 0 18px 50px rgba(45, 37, 24, .12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        linear-gradient(135deg, rgba(23, 111, 93, .08), transparent 32%),
        linear-gradient(315deg, rgba(200, 75, 49, .08), transparent 34%),
        var(--paper);
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
      min-height: 100vh;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .shell {
      width: min(1440px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: grid;
      grid-template-columns: 1.4fr .8fr;
      gap: 24px;
      align-items: end;
      padding: 24px 0 22px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 56px);
      line-height: 1.02;
      letter-spacing: 0;
      max-width: 820px;
    }

    .subhead {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
      max-width: 760px;
    }

    .status {
      justify-self: end;
      width: min(100%, 360px);
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 16px;
      border-radius: 8px;
    }

    .status strong {
      display: block;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .status span {
      display: block;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .mindset-btn {
      border: 0;
      border-radius: 6px;
      padding: 11px 13px;
      cursor: pointer;
      font-weight: 800;
      color: #fff;
      background: var(--accent-2);
      transition: transform .16s ease, filter .16s ease;
    }

    .mindset-btn:hover {
      transform: translateY(-1px);
      filter: brightness(.98);
    }

    main {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 24px;
      margin-top: 24px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .form-panel {
      position: sticky;
      top: 20px;
      padding: 18px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    h2 {
      margin: 0;
      font-size: 19px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .field {
      margin-top: 14px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #3c3932;
      font-size: 13px;
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid #cfc7b8;
      background: #fffaf0;
      color: var(--ink);
      border-radius: 6px;
      padding: 11px 12px;
      outline: none;
    }

    textarea {
      min-height: 82px;
      resize: vertical;
      line-height: 1.55;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(23, 111, 93, .15);
    }

    .quick-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      border: 0;
      border-radius: 6px;
      padding: 11px 12px;
      cursor: pointer;
      font-weight: 800;
      color: #fff;
      background: var(--accent);
      transition: transform .16s ease, filter .16s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(.97);
    }

    .btn.secondary {
      background: #3e3a33;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .tab {
      border: 1px solid var(--line);
      background: rgba(255, 253, 248, .78);
      color: #474238;
      border-radius: 8px;
      padding: 12px 10px;
      cursor: pointer;
      font-weight: 800;
      text-align: center;
    }

    .tab.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .templates {
      display: grid;
      gap: 14px;
    }

    .template-card {
      padding: 18px;
    }

    .card-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      margin-bottom: 12px;
    }

    .card-head h3 {
      margin: 0 0 6px;
      font-size: 21px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .goal {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .prompt {
      width: 100%;
      min-height: 230px;
      margin-top: 12px;
      border: 1px dashed #bdb2a0;
      background: #fffaf0;
      border-radius: 8px;
      padding: 14px;
      white-space: pre-wrap;
      line-height: 1.7;
      color: #28251f;
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
    }

    .copy {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 116px;
      border: 0;
      border-radius: 6px;
      padding: 10px 12px;
      background: var(--accent-2);
      color: #fff;
      cursor: pointer;
      font-weight: 800;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      background: var(--ink);
      color: #fff;
      padding: 12px 16px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      transition: opacity .18s ease, transform .18s ease;
      z-index: 10;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(32, 32, 29, .72);
      z-index: 20;
    }

    .modal.open {
      display: flex;
    }

    .modal-panel {
      width: min(980px, 100%);
      max-height: min(92vh, 1160px);
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 22px 70px rgba(0, 0, 0, .28);
    }

    .modal-head {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 14px;
      background: rgba(255, 253, 248, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }

    .modal-head h2 {
      font-size: 18px;
    }

    .close-btn {
      border: 0;
      border-radius: 6px;
      width: 38px;
      height: 38px;
      cursor: pointer;
      color: #fff;
      background: var(--ink);
      font-size: 24px;
      line-height: 1;
    }

    .mindset-image {
      display: block;
      width: 100%;
      height: auto;
    }

    @media (max-width: 980px) {
      header,
      main {
        grid-template-columns: 1fr;
      }

      .status {
        justify-self: stretch;
        width: 100%;
      }

      .form-panel {
        position: static;
      }
    }

    @media (max-width: 680px) {
      .shell {
        width: min(100% - 24px, 1440px);
        padding-top: 14px;
      }

      .modal {
        padding: 10px;
      }

      .tabs {
        grid-template-columns: 1fr 1fr;
      }

      .quick-row,
      .actions {
        grid-template-columns: 1fr;
      }

      .card-head {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1>跨境电商图片提示词库</h1>
        <p class="subhead">给美国和英国市场做主图、副图、信息图和对比图。填一次产品信息，下面所有模板会自动替换，点击即可复制。</p>
      </div>
      <aside class="status">
        <strong>办公室使用方式</strong>
        <span>本页是单文件静态工具，可本地打开，也可用局域网地址给同事访问。平台选择 TikTok Shop 时显示短视频货架专用模板，其他平台保留通用电商模板。</span>
        <div class="header-actions">
          <button class="mindset-btn" id="openMindset" type="button">查看 6 个 Prompt 心法</button>
        </div>
      </aside>
    </header>

    <main>
      <section class="panel form-panel" aria-label="产品信息">
        <div class="panel-title">
          <h2>产品信息</h2>
          <span class="hint">常用项先填</span>
        </div>

        <div class="field">
          <label for="product">产品名称</label>
          <input id="product" value="不锈钢压蒜器" placeholder="例如：不锈钢压蒜器">
        </div>

        <div class="quick-row">
          <div class="field">
            <label for="platform">平台</label>
            <select id="platform">
              <option>TikTok Shop</option>
              <option>Amazon</option>
              <option>eBay</option>
              <option>Shopify</option>
              <option>通用电商</option>
            </select>
          </div>
          <div class="field">
            <label for="ratio">画面比例</label>
            <select id="ratio">
              <option>4:5</option>
              <option>1:1</option>
              <option>3:4</option>
              <option>16:9</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="buyer">目标买家</label>
          <input id="buyer" value="美国和英国注重实用、品质和性价比的家庭用户" placeholder="例如：小户型家庭、办公室人群">
        </div>

        <div class="field">
          <label for="benefit">核心卖点</label>
          <textarea id="benefit" placeholder="例如：省力压蒜、易清洗、不伤手、适合日常厨房使用">省力、易清洗、结实耐用，适合日常厨房快速备餐</textarea>
        </div>

        <div class="field">
          <label for="pain">用户痛点</label>
          <textarea id="pain" placeholder="例如：普通压蒜器费力、难清洗、容易断裂">普通工具费力、蒜泥残留难清理、廉价塑料感强</textarea>
        </div>

        <div class="field">
          <label for="details">材质 / 颜色 / 尺寸</label>
          <textarea id="details" placeholder="例如：304不锈钢，银色，手柄防滑">银色不锈钢材质，圆润手柄，坚固金属质感</textarea>
        </div>

        <div class="field">
          <label for="avoid">必须避免</label>
          <textarea id="avoid">竞品品牌名称、Logo、水印、虚假认证、夸大宣传、误导性前后对比、错误产品结构</textarea>
        </div>

        <div class="actions">
          <button class="btn" id="fillSample" type="button">填入示例</button>
          <button class="btn secondary" id="clearFields" type="button">清空重填</button>
        </div>
      </section>

      <section aria-label="提示词模板">
        <nav class="tabs" aria-label="模板分类">
          <button class="tab active" data-group="core" type="button">核心图片</button>
          <button class="tab" data-group="conversion" type="button">转化副图</button>
          <button class="tab" data-group="detail" type="button">规格细节</button>
          <button class="tab" data-group="bundle" type="button">整套生成</button>
        </nav>
        <div class="templates" id="templates"></div>
      </section>
    </main>
  </div>

  <div class="modal" id="mindsetModal" aria-hidden="true" role="dialog" aria-label="6 个常用 Prompt 心法">
    <div class="modal-panel">
      <div class="modal-head">
        <h2>6 个常用 Prompt 心法</h2>
        <button class="close-btn" id="closeMindset" type="button" aria-label="关闭">×</button>
      </div>
      <img class="mindset-image" src="assets/prompt-mindset.png" alt="6 个常用 Prompt 心法">
    </div>
  </div>

  <div class="toast" id="toast">已复制</div>

  <script>
    const fields = ["product", "platform", "ratio", "buyer", "benefit", "pain", "details", "avoid"];

    const templates = [
      {
        mode: "tiktok",
        group: "core",
        title: "TikTok Shop 高点击封面图",
        tag: "封面 / 移动端优先",
        goal: "用于商品卡片和短视频挂车封面，先抓住手机端买家的注意力。",
        prompt: `为【product】生成一张适合 TikTok Shop 的高点击商品封面图，目标客户是【buyer】，主要售卖国家是美国和英国。

画面要有强烈的短视频电商吸引力，适合手机端快速浏览。产品必须清晰可见，并且是画面主角。场景要真实、明亮、生活化，让买家一眼理解产品能解决的问题：【pain】，并感受到核心好处：【benefit】。

可以出现真实手部或真人局部使用场景，但不要让人物抢走产品主体。产品细节：【details】。

风格关键词：TikTok Shop product cover, viral product photography, realistic UGC style, mobile-first composition, bright lighting, high conversion, clear product focus, lifestyle shopping image。

画面比例：【ratio】。

不要添加竞品 Logo、水印、虚假认证、夸大文字、误导性效果、过度修图、错误产品结构。必须避免：【avoid】。`
      },
      {
        mode: "tiktok",
        group: "core",
        title: "真人使用种草图",
        tag: "UGC / 真实使用",
        goal: "让买家觉得这是普通人真实在用，而不是棚拍广告。",
        prompt: `为【product】生成一张 TikTok Shop 风格的真人使用种草图，目标客户是【buyer】。

画面展示真实用户正在自然使用产品，人物可以只露出手部、局部身体或生活场景，不需要正脸。产品要清楚可见，占据视觉中心。画面重点表达：【benefit】。

场景要像美国或英国消费者日常生活中的真实瞬间，光线明亮，构图直接，适合手机屏幕快速滑动时停留。产品细节：【details】。

风格关键词：realistic UGC product photo, TikTok Shop lifestyle image, authentic user-generated content, natural hands using product, bright mobile shopping visual。

画面比例：【ratio】。

不要出现夸张表演、廉价摆拍感、竞品品牌、平台水印、虚假认证、错误产品结构。必须避免：【avoid】。`
      },
      {
        mode: "tiktok",
        group: "conversion",
        title: "痛点瞬间图",
        tag: "痛点 / 停留钩子",
        goal: "先让买家看到自己的麻烦，再自然引出产品。",
        prompt: `为【product】生成一张 TikTok Shop 痛点瞬间图，目标客户是【buyer】。

画面要在 1 秒内表现用户痛点：【pain】。同时让产品作为解决方案自然出现，突出核心卖点：【benefit】。

可以采用生活场景、局部特写、使用前的尴尬瞬间或左右对比构图，但必须真实可信，不要夸张到像虚假广告。产品细节：【details】。

风格关键词：TikTok problem solution product image, viral shopping hook, realistic lifestyle pain point, mobile-first composition, bright and clear product focus。

画面比例：【ratio】。

不要使用恐吓式画面、虚假前后对比、竞品 Logo、水印、夸大承诺、错误产品结构。必须避免：【avoid】。`
      },
      {
        mode: "tiktok",
        group: "conversion",
        title: "使用前后对比图",
        tag: "对比 / 冲动下单",
        goal: "用最短路径让买家理解买前买后的差异。",
        prompt: `为【product】生成一张适合 TikTok Shop 的使用前后对比图，目标客户是【buyer】。

画面左右分屏或上下分屏。对比普通状态下的问题：【pain】，以及使用本产品后的改善：【benefit】。产品必须清晰出现在改善后的画面中，并且看起来真实可信。

整体要适合手机端浏览，文字少，视觉差异明显，但不要做虚假、夸张或医学/功效类误导表达。产品细节：【details】。

风格关键词：TikTok Shop before after comparison, realistic product result, mobile-first split screen, high conversion product image, clear visual difference。

画面比例：【ratio】。

不要出现竞品品牌名称、虚假认证、过度夸张效果、误导性前后对比、错误产品结构。必须避免：【avoid】。`
      },
      {
        mode: "tiktok",
        group: "conversion",
        title: "直播间挂车图",
        tag: "直播 / 商品卡",
        goal: "适合直播间商品卡、短视频挂车和促销入口。",
        prompt: `为【product】生成一张 TikTok Shop 直播间挂车商品图，目标客户是【buyer】。

画面要直接、醒目、商品感强。产品放在视觉中心，背景可以是明亮生活场景或干净浅色背景。突出购买理由：【benefit】。允许使用简短大字卖点，但文字必须少、清楚、手机端可读。

整体要有热卖商品的吸引力，但不要像低质广告。产品细节：【details】。

风格关键词：TikTok Shop live shopping product card, viral product display, mobile commerce design, bright clean layout, clear product hero, high conversion。

画面比例：【ratio】。

不要出现虚假折扣、平台 Logo、水印、竞品品牌、夸大功效、太多文字、错误产品结构。必须避免：【avoid】。`
      },
      {
        mode: "tiktok",
        group: "detail",
        title: "移动端卖点信息图",
        tag: "信息图 / 小屏可读",
        goal: "把卖点做得适合手机屏幕，而不是电脑详情页。",
        prompt: `为【product】生成一张 TikTok Shop 移动端卖点信息图，目标客户是【buyer】。

产品放大展示，周围只保留 3 个最重要卖点，围绕：【benefit】。每个卖点文字要短，图标简单，手机小屏也能看清。

背景干净明亮，构图紧凑但不拥挤。产品细节：【details】。整体要比传统亚马逊信息图更有短视频电商的活力。

风格关键词：TikTok Shop mobile infographic, short benefit callouts, clear product focus, bright e-commerce design, readable on phone, viral shopping visual。

画面比例：【ratio】。

不要使用密密麻麻的小字、复杂表格、虚假认证、竞品 Logo、水印、错误产品结构。必须避免：【avoid】。`
      },
      {
        mode: "tiktok",
        group: "detail",
        title: "开箱套装展示图",
        tag: "开箱 / 到手感",
        goal: "让买家清楚知道下单后会收到什么。",
        prompt: `为【product】生成一张 TikTok Shop 风格的开箱或套装展示图，目标客户是【buyer】。

展示产品、包装和随附配件的整齐摆放效果。如果没有明确配件，只展示产品本体和简洁包装。画面要有到手感、真实感和品质感。

重点表达：【benefit】。产品和包装细节：【details】。构图适合手机端浏览，明亮、干净、直接。

风格关键词：TikTok Shop unboxing image, product bundle display, realistic packaging presentation, mobile-first shopping image, bright clean layout。

画面比例：【ratio】。

    function buildPrompt(template) {
      return template

        .replaceAll("【platform】", valueOf("platform"))
        .replaceAll("【ratio】", valueOf("ratio"))
        .replaceAll("【buyer】", valueOf("buyer"))
        .replaceAll("【benefit】", valueOf("benefit"))
        .replaceAll("【pain】", valueOf("pain"))
        .replaceAll("【details】", valueOf("details"))
        .replaceAll("【avoid】", valueOf("avoid"));
    }

    function render() {
      const container = document.getElementById("templates");
      container.innerHTML = "";

      templates
        .filter((item) => item.group === activeGroup && (item.mode || "standard") === templateMode())
        .forEach((item, index) => {
          const article = document.createElement("article");
          article.className = "panel template-card";

          const promptText = buildPrompt(item.prompt);
          article.innerHTML = `
            <div class="card-head">
              <div>
                <h3>${item.title}</h3>
                <p class="goal">${item.goal}</p>
              </div>
              <span class="badge">${item.tag}</span>
            </div>
            <div class="prompt" id="prompt-${index}" tabindex="0"></div>
            <div class="card-actions">
              <button class="copy" type="button" data-copy="${index}">复制提示词</button>
              <span class="meta">已按左侧产品信息自动替换</span>
            </div>
          `;

          container.appendChild(article);
          article.querySelector(".prompt").textContent = promptText;
          article.querySelector(".copy").addEventListener("click", () => copyText(promptText));
        });
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const helper = document.createElement("textarea");
        helper.value = text;
        helper.style.position = "fixed";
        helper.style.opacity = "0";
        document.body.appendChild(helper);
        helper.select();
        document.execCommand("copy");
        helper.remove();
      }
      showToast("已复制提示词");
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1400);
    }

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        activeGroup = tab.dataset.group;
        document.querySelectorAll(".tab").forEach((item) => item.classList.toggle("active", item === tab));
        render();
      });
    });

    document.getElementById("fillSample").addEventListener("click", () => {

          element.selectedIndex = 0;

          element.value = "";

      });
      render();
      showToast("已清空");

    const mindsetModal = document.getElementById("mindsetModal");
    const openMindset = document.getElementById("openMindset");
    const closeMindset = document.getElementById("closeMindset");

    function setMindsetOpen(isOpen) {
      mindsetModal.classList.toggle("open", isOpen);
      mindsetModal.setAttribute("aria-hidden", String(!isOpen));
      document.body.style.overflow = isOpen ? "hidden" : "";
    }

    openMindset.addEventListener("click", () => setMindsetOpen(true));
    closeMindset.addEventListener("click", () => setMindsetOpen(false));
    mindsetModal.addEventListener("click", (event) => {
      if (event.target === mindsetModal) {
        setMindsetOpen(false);
      }
    });
